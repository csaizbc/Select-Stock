name: Update tomorrow stock list

on:
  workflow_dispatch:
  schedule:
    # 临时测试：北京时间 18:15 触发，用于验证 GitHub Actions schedule 派发。
    - cron: "15 18 * * 1-5"
      timezone: "Asia/Shanghai"

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Check TUSHARE_TOKEN
        run: test -n "$TUSHARE_TOKEN"
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      - run: python generate.py
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist output cache
          git diff --cached --quiet || git commit -m "Update tomorrow stock list"
          git push
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
