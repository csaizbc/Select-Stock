name: Update tomorrow stock list

on:
  workflow_dispatch:
  schedule:
    # GitHub schedule 可能延迟或丢弃，使用多个错峰时间提高触发概率。
    # UTC 09:37/09:52/10:07 = 北京时间 17:37/17:52/18:07，工作日 A 股收盘后自动更新。
    - cron: "37 9 * * 1-5"
    - cron: "52 9 * * 1-5"
    - cron: "7 10 * * 1-5"

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-tomorrow-stock-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Check TUSHARE_TOKEN
        run: test -n "$TUSHARE_TOKEN"
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      - run: python generate.py
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist output cache
          git diff --cached --quiet || git commit -m "Update tomorrow stock list"
          git push
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
