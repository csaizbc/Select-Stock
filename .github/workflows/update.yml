name: Update tomorrow stock list

on:
  # Deploy UI changes pushed to main; generated output commits do not match these paths.
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update.yml"
      - "api/**"
      - "config.example.json"
      - "generate.py"
      - "strength.py"
      - "strength_page.py"
      - "backtest.py"
      - "pyproject.toml"
      - "requirements.txt"
      - "vercel.json"
  # Triggered by Vercel Cron via the GitHub workflow_dispatch API.
  workflow_dispatch:
  # Fallback scheduler in case the Vercel trigger misses a weekday run.
  schedule:
    - cron: "10 12 * * 1-5"

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-tomorrow-stock-list
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Check TUSHARE_TOKEN
        run: test -n "$TUSHARE_TOKEN"
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      - run: python generate.py
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist output cache
          git diff --cached --quiet || git commit -m "Update tomorrow stock list"
          git push
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retrying Pages deploy
        if: steps.deployment.outcome == 'failure'
        run: sleep 120
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
